<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Workout</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <nav id="sidebar">
            <div class="sidebar-header">WORKOUT TRACKER</div>
            <ul>
                <li><a href="/">VIEW LOG</a></li>
                <li><a href="/add">ADD WORKOUT</a></li>
            </ul>
        </nav>

        <main class="content-area">
            <div class="main-container">
                <h1>Add New Workout</h1>
                <form action="/add" id="workout-form" method="POST">
                    
                    <div class="workout-card">
                        <label>Workout Title:</label>
                        <input type="text" name="title" placeholder="e.g. Chest Day">
                    </div>

                    <div class="exercise-container">
                        {% for i in range(1, 6) %}
                            <div class="exercise-group-card">
                                <div class="exercise-name-header">
                                    <select name="ex_name_{{ i }}">
                                        <option value="">-- Select Exercise {{ i }} --</option>
                                        {% for group, names in exercises.items() %}
                                            <optgroup label="{{ group }}">
                                                {% for name in names %}
                                                    <option value="{{ name }}">{{ name }}</option>
                                                {% endfor %}
                                            </optgroup>
                                        {% endfor %}
                                    </select>
                                </div>
                                
                                <div class="sets-list">
                                    <div class="set-input-group">
                                        <span class="set-label">Set 1:</span>
                                        <div class="set-input-row">
                                            <input type="number" name="weight_{{ i }}" placeholder="kg">
                                            <input type="number" name="reps_{{ i }}" placeholder="Reps">
                                        </div>
                                    </div>

                                    <div class="set-separator"></div>

                                    <div class="set-input-group">
                                        <span class="set-label">Set 2:</span>
                                        <div class="set-input-row">
                                            <input type="number" name="weight_{{ i }}" placeholder="kg">
                                            <input type="number" name="reps_{{ i }}" placeholder="Reps">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        {% endfor %}
                    </div>

                    <button type="submit" class="btn-save" style="width: 100%;">Save Workout</button>
                </form>
            </div>
        </main>
    </div>
    
</body>
</html>

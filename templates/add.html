<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Workout</title>
</head>
<body>

    <ul>
        <li><a href="/">VIEW LOG</a></li>
        <li><a href="/add">ADD WORKOUT</a></li>
    </ul>
    <hr>

    <h1>Add New Workout</h1>
    <form action="/add" method="POST">
        <label>Workout Title:</label>
        <input type="text" name="title" placeholder="e.g. Chest Day" required>
        <hr>

        {% for i in range(1, 6) %}
        <h3>Exercise {{ i }}</h3>
        <input type="text" name="ex_name" placeholder="Exercise Name">
        <input type="number" name="weight" placeholder="kg">
        <input type="number" name="reps" placeholder="Reps">
        <br>
        <input type="text" name="ex_name" placeholder="Exercise Name">
        <input type="number" name="weight" placeholder="kg">
        <input type="number" name="reps" placeholder="Reps">
        <hr>
        {% endfor %}

        <button type="submit">SAVE WORKOUT</button>
    </form>
    
</body>
</html>
